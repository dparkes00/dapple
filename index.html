<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#141414"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Dapple"/>
<title>Dapple</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #141414;
  --bg2:      #181818;
  --surface:  #1e1e1e;
  --surface2: #242424;
  --surface3: #2a2a2a;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --gold:     #c8a800;
  --gold-dim: #7a6400;
  --gold-bg:  rgba(200,168,0,0.08);
  --text:     #a8a8a8;
  --text2:    #686868;
  --text3:    #444444;
  --red:      #b83030;
  --green:    #27a86a;
  --blue:     #3d8fd4;
  --amber:    #c88a00;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;overflow-x:hidden}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}

.header{
  position:sticky;top:0;z-index:100;background:var(--bg);
  padding:10px 18px 10px;
  border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  overflow:visible;
}
.header-left{display:flex;flex-direction:column;gap:4px}
.logo{font-family:'Outfit',sans-serif;font-size:22px;font-weight:600;color:var(--text2);letter-spacing:-0.3px;line-height:1}
.logo span{color:var(--gold)}
.month-nav{display:flex;align-items:center;gap:2px}
.month-nav button{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:1px 3px;border-radius:5px;line-height:1}
.month-nav button:active{background:var(--surface2)}
.month-label{font-size:11px;font-weight:400;color:var(--text2);min-width:68px;text-align:center}
.header-badge{
  position:absolute;left:50%;transform:translateX(-50%);
  top:6px;
  width:82px;height:82px;border-radius:19px;background:#141414;
  display:flex;align-items:center;justify-content:center;
  border:0.5px solid rgba(200,168,0,0.22);
  z-index:102;
}
.history-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  background:var(--surface);border:0.5px solid var(--border);
  border-radius:13px;padding:13px 15px;
  font-size:13px;font-weight:400;color:var(--text2);
  font-family:'Outfit',sans-serif;cursor:pointer;
}
.history-btn:active{background:var(--surface2)}
.back-btn{
  background:var(--surface);border:0.5px solid var(--border);
  border-radius:10px;padding:6px 8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);flex-shrink:0;
}
.back-btn:active{background:var(--surface2)}
.hist-month{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden}
.hist-month-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;cursor:pointer}
.hist-month-hdr:active{background:var(--surface2)}
.hist-month-name{font-size:13px;font-weight:500;color:var(--text)}
.hist-month-total{font-size:13px;font-weight:400;color:var(--text2)}
.hist-body{display:none;border-top:0.5px solid var(--border)}
.hist-body.open{display:block}
.hist-bucket{padding:10px 15px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.hist-bucket:last-child{border-bottom:none}
.hist-bucket-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hist-bucket-name{font-size:12px;color:var(--text);flex:1}
.hist-bucket-val{font-size:12px;color:var(--text2);font-weight:300}
.hist-totals{background:var(--surface2);border:0.5px solid var(--border);border-radius:13px;padding:15px;margin-bottom:8px}
.hist-totals-title{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px}
.hist-totals-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.hist-total-card{background:var(--surface);border:0.5px solid var(--border);border-radius:9px;padding:9px 11px}
.hist-total-label{font-size:9px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.hist-total-val{font-size:16px;font-weight:300;color:var(--text)}
.eye-toggle{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.eye-toggle:active{background:var(--surface2)}
.eye-toggle svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.scroll{overflow-y:auto;height:calc(100vh - 58px);padding:40px 13px 40px}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden}
.card-header{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;user-select:none}
.card-header:active{background:var(--surface2)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.card-title{font-size:13px;font-weight:500;flex:1;color:var(--text);letter-spacing:0.01em}
.card-total{font-size:13px;font-weight:400;color:var(--text2)}
.card-total.blurred{filter:blur(6px)}
.chevron{font-size:9px;color:var(--text3);transition:transform 0.2s;margin-left:2px}
.chevron.open{transform:rotate(90deg)}
.card-body{display:none;border-top:0.5px solid var(--border)}
.card-body.open{display:block}

.privacy-row{display:flex;align-items:center;gap:10px;padding:9px 15px;border-bottom:0.5px solid var(--border)}
.privacy-row span{font-size:11px;color:var(--text2);flex:1}
.pill-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Outfit',sans-serif}
.pill-btn:active{opacity:0.7}

.item-row{border-bottom:0.5px solid var(--border)}
.item-row:last-of-type{border-bottom:none}
.item-main{display:flex;align-items:center;gap:8px;padding:10px 15px}
.item-name{font-size:13px;color:var(--text);flex:1;cursor:pointer;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400}
.item-name-input{font-size:13px;color:var(--text);flex:1;border:none;background:transparent;outline:none;min-width:0;font-family:'Outfit',sans-serif}
.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.item-amt{font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-weight:300}
.item-amt.blurred{filter:blur(5px);pointer-events:none}
.item-amt-input{font-size:13px;color:var(--text2);width:80px;text-align:right;border:none;background:transparent;outline:none;font-family:'Outfit',sans-serif;font-weight:300}
.split-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--gold-bg);color:var(--gold);border:0.5px solid rgba(200,168,0,0.18);cursor:pointer;white-space:nowrap}
.edit-btn{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 5px;line-height:1;flex-shrink:0}
.edit-btn:active{color:var(--gold)}
.confirm-split{display:flex;justify-content:flex-end;padding:8px 0 2px}
.confirm-btn{font-size:12px;padding:6px 16px;border-radius:20px;background:var(--gold-bg);color:var(--gold);border:0.5px solid rgba(200,168,0,0.25);cursor:pointer;font-family:'Outfit',sans-serif;font-weight:500}
.confirm-btn:active{opacity:0.7}
.bills-action-btn{flex:1;font-size:11px;padding:6px 4px;border-radius:7px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Outfit',sans-serif;text-align:center}
.bills-action-btn:active{opacity:0.7}
.bills-action-btn.disabled{opacity:0.35;cursor:default}
.bank-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:8px;background:var(--surface2);color:var(--text2);border:0.5px solid var(--border2);font-family:'Outfit',sans-serif}
.acct-chip{font-size:12px;padding:5px 11px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Outfit',sans-serif}
.acct-chip.acct-active{background:var(--gold-bg);color:var(--gold);border-color:rgba(200,168,0,0.3)}
.acct-chip.acct-manage{color:var(--text3);border-style:dashed}
.acct-chip:active{opacity:0.7}
.del-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 4px;line-height:1}
.del-btn:active{color:var(--red)}

.split-panel{background:var(--surface2);padding:11px 15px 13px;display:none}
.split-panel.open{display:block}
.split-panel-title{font-size:11px;color:var(--text2);margin-bottom:9px}
.split-field{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.split-lbl{font-size:12px;color:var(--text2);width:70px;flex-shrink:0;font-weight:300}
.split-input{font-size:13px;padding:5px 9px;border:0.5px solid var(--border2);border-radius:7px;background:var(--surface3);color:var(--text);width:95px;font-family:'Outfit',sans-serif;font-weight:300}
.split-hint{font-size:11px;color:var(--text3)}
.mode-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.mode-pill{font-size:11px;padding:4px 9px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface3);color:var(--text2);cursor:pointer;font-family:'Outfit',sans-serif}
.mode-pill.active{background:var(--gold-bg);color:var(--gold);border-color:rgba(200,168,0,0.25)}
.mode-pill:active{opacity:0.7}

.add-row{padding:9px 15px}
.add-btn{font-size:12px;color:var(--text2);background:none;border:0.5px dashed var(--border2);border-radius:7px;padding:6px 12px;cursor:pointer;font-family:'Outfit',sans-serif;width:100%;text-align:left}
.add-btn:active{background:var(--surface2)}
.extra-note{font-size:11px;color:var(--text3);padding:3px 15px 9px;font-weight:300}

.overview{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;padding:15px;margin-top:4px}
.ov-title{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.1em}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:13px}
.ov-card{background:var(--surface2);border-radius:9px;padding:9px 11px;border:0.5px solid var(--border)}
.ov-label{font-size:9px;font-weight:500;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.08em}
.ov-val{font-size:17px;font-weight:300;color:var(--text)}
.ov-val.blurred{filter:blur(6px)}
.ov-val.neg{color:var(--red)}
.bar-track{height:4px;border-radius:2px;background:var(--surface3);overflow:hidden;display:flex;margin-bottom:6px}
.bar-seg{height:100%;transition:width 0.35s ease}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:11px;font-weight:300}
.bar-labels .neg{color:var(--red)}
.bar-labels span.blurred{filter:blur(5px)}
.legend{display:flex;flex-wrap:wrap;gap:9px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:300}
.legend-dot{width:6px;height:6px;border-radius:50%}
#income-section .card{border-color:rgba(200,168,0,0.12)}
.salary-row .item-name{cursor:default}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo"><span>d</span>a<span>pp</span>le</div>
    <div class="month-nav">
      <button id="prev-month">&#8249;</button>
      <span class="month-label" id="month-label"></span>
      <button id="next-month">&#8250;</button>
      <button id="payday-edit-btn" title="Edit pay day" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:1px 3px;line-height:1;font-size:12px">✎</button>
    </div>
  </div>
  <div class="header-badge">
    <svg viewBox="0 0 76 76" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%">
      <circle cx="38" cy="38" r="30" fill="none" stroke="#c8a800" stroke-width="1.5"/>
      <circle cx="38" cy="38" r="25" fill="none" stroke="#7a6400" stroke-width="0.6"/>
    </svg>
    <svg viewBox="137 139 900 892" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="width:62%;height:62%;position:relative;z-index:1">

    </svg>
  </div>
  <button class="eye-toggle" id="header-eye" title="Toggle values">
    <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>
<div class="scroll" id="main-screen">
  <div id="income-section"></div>
  <div id="buckets"></div>
  <div id="overview"></div>
  <div style="padding:16px 0 4px">
    <button class="history-btn" id="go-history">
      <svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      All months — spending history
      <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-left:auto"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<div class="scroll" id="history-screen" style="display:none">
  <div style="display:flex;align-items:center;gap:10px;padding:4px 0 16px">
    <button class="back-btn" id="go-back">
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span style="font-size:14px;font-weight:500;color:var(--text)">Spending history</span>
  </div>
  <div id="history-content"></div>
</div>

<script>
const C={bills:'#b83030',saving:'#27a86a',investing:'#3d8fd4',free:'#c88a00'};

function defaultState(){return{incomeVisible:false,income:2800,salaryBank:'',extraIncome:[],buckets:[{id:'bills',name:'Bills',color:C.bills,items:[{id:1,name:'Rent',total:1000,mode:'fixed',myAmt:550},{id:2,name:'Energy',total:85,mode:'full',myAmt:85},{id:3,name:'Water',total:30,mode:'full',myAmt:30},{id:4,name:'Council tax',total:120,mode:'full',myAmt:120}]},{id:'saving',name:'Saving',color:C.saving,items:[{id:5,name:'Emergency fund',total:150,mode:'full',myAmt:150}]},{id:'investing',name:'Investing',color:C.investing,items:[{id:6,name:'Stocks / ETFs',total:100,mode:'full',myAmt:100}]},{id:'free',name:'Free spend',color:C.free,items:[{id:7,name:'Food & going out',total:200,mode:'full',myAmt:200}]}],open:{income:false,bills:true,saving:false,investing:false,free:false},splitOpen:{},nextId:20};}

let currentDate=new Date();

// ── PAY DAY SETTING ──
function getPayDay(){try{const v=parseInt(localStorage.getItem('dapple-payday'));return(v>=1&&v<=28)?v:1;}catch(e){return 1;}}
function setPayDay(d){try{localStorage.setItem('dapple-payday',d);}catch(e){}}
let payDay=getPayDay();

function periodStart(d){
  const day=d.getDate(),m=d.getMonth(),y=d.getFullYear();
  if(day>=payDay){
    return new Date(y,m,payDay);
  } else {
    return new Date(y,m-1,payDay);
  }
}

function periodEnd(start){
  const next=new Date(start.getFullYear(),start.getMonth()+1,payDay);
  return new Date(next.getTime()-86400000);
}

const monthKey=d=>{
  const s=periodStart(d);
  return `${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,'0')}-${String(s.getDate()).padStart(2,'0')}`;
};

function monthLbl(d){
  const s=periodStart(d);
  const e=periodEnd(s);
  const f=(dt)=>dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  const yr=s.getFullYear()!==e.getFullYear()?` ${e.getFullYear()}`:'';
  return `${f(s)} – ${f(e)}${yr}`;
}

const saveState=()=>{try{localStorage.setItem('dapple-'+monthKey(currentDate),JSON.stringify(state));}catch(e){}};
const loadState=()=>{try{const r=localStorage.getItem('dapple-'+monthKey(currentDate));if(r)return JSON.parse(r);}catch(e){}return defaultState();};

const fmt=n=>'£'+Math.round(n).toLocaleString('en-GB');

const bucketTotal=b=>b.items.reduce((s,i)=>s+myAmt(i),0);
const totalOut=()=>state.buckets.reduce((s,b)=>s+bucketTotal(b),0);
const extraTotal=()=>state.extraIncome.reduce((s,i)=>s+Number(i.amt),0);
const totalIncome=()=>Number(state.income)+extraTotal();
const splitLabel=item=>{if(item.mode==='full')return null;if(item.mode==='half')return'50%';if(item.mode==='pct'){const p=item.total>0?Math.round((item.myAmt/item.total)*100):0;return p+'%';}return'split';};

const render=()=>{updateEyeIcon();renderIncome();renderBuckets();renderOverview();};

function stepPeriod(direction){
  save();
  const s=periodStart(currentDate);
  currentDate=new Date(s.getFullYear(),s.getMonth()+direction,s.getDate());
  state=loadState();
  document.getElementById('month-label').textContent=monthLbl(currentDate);
  render();
}

    el.appendChild(div);

  document.querySelectorAll('.split-input').forEach(inp=>{inp.addEventListener('input',()=>{const bid=inp.dataset.bid,iid=parseInt(inp.dataset.iid),b=state.buckets.find(x=>x.id===bid),item=b.items.find(i=>i.id===iid),v=parseFloat(inp.value)||0;if(inp.dataset.field==='total'){item.total=v;if(item.mode==='half')item.myAmt=v/2;if(item.mode==='pct'){const p=item.total>0?item.myAmt/item.total:0.5;item.myAmt=v*p;}if(item.mode==='full')item.myAmt=v;}else if(inp.dataset.field==='myAmt')item.myAmt=Math.min(v,item.total);else if(inp.dataset.field==='pct')item.myAmt=(v/100)*item.total;save();const row=document.querySelector(`.item-row[data-bid="${bid}"][data-iid="${iid}"]`);if(row){const as=row.querySelector('.item-amt');if(as)as.innerHTML=`${fmt(myAmt(item))}${item.mode!=='full'?`<span style="font-size:10px;color:var(--text3)"> of ${fmt(item.total)}</span>`:''}`;const bh=document.querySelector(`.card-header[data-bid="${bid}"] .card-total`);if(bh)bh.textContent=fmt(bucketTotal(b));}renderOverview();});});

const getItem=(bid,iid)=>state.buckets.find(b=>b.id===bid)?.items.find(i=>i.id===iid);

// ── BILLS TEMPLATE ──
function getBillsDefault(){
  try{const r=localStorage.getItem('dapple-bills-default');if(r)return JSON.parse(r);}catch(e){}
  return null;
}
function saveBillsDefault(){
  const bills=state.buckets.find(b=>b.id==='bills');
  if(!bills)return;
  try{localStorage.setItem('dapple-bills-default',JSON.stringify(bills.items));}catch(e){}
}
function clearBills(){
  const bills=state.buckets.find(b=>b.id==='bills');
  if(bills) bills.items=[];
  save();render();
}
function importBillsDefault(){
  const def=getBillsDefault();
  if(!def){showToast('No default saved yet');return;}
  const bills=state.buckets.find(b=>b.id==='bills');
  if(bills){
    // Deep clone items with fresh IDs to avoid conflicts
    bills.items=def.map(item=>({...item,id:state.nextId++}));
    save();render();
    showToast('Default bills imported');
  }
}
function showToast(msg){
  document.getElementById('dapple-toast')?.remove();
  const t=document.createElement('div');
  t.id='dapple-toast';
  t.textContent=msg;
  t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);font-family:\'Outfit\',sans-serif;font-size:12px;padding:8px 16px;border-radius:20px;border:0.5px solid var(--border2);z-index:400;white-space:nowrap';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2200);
}

function showManageAccounts(onClose){
  document.getElementById('manage-accts-modal')?.remove();
  let accounts=[...getAccounts()];
  const overlay=document.createElement('div');
  overlay.id='manage-accts-modal';
  overlay.style.cssText='position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.65);display:flex;align-items:flex-end;';

  function buildSheet(){
    return `<div style="background:var(--surface);width:100%;border-radius:18px 18px 0 0;padding:20px 18px 32px;border-top:0.5px solid var(--border2);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span style="font-size:13px;font-weight:500;color:var(--text);font-family:'Outfit',sans-serif">Bank accounts</span>
        <button id="ma-close" style="background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 6px">✕</button>
      </div>
      <p style="font-size:12px;color:var(--text2);margin-bottom:14px;font-family:'Outfit',sans-serif;line-height:1.5">These appear as tags on each item. Tap ✕ to remove one.</p>
      <div id="acct-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
        ${accounts.map((a,i)=>`<div style="display:flex;align-items:center;gap:4px;background:var(--surface2);border:0.5px solid var(--border2);border-radius:8px;padding:4px 8px"><span style="font-size:12px;color:var(--text);font-family:'Outfit',sans-serif">${a}</span><button data-remove="${i}" style="background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;line-height:1;padding:0 2px">✕</button></div>`).join('')}
        ${accounts.length===0?`<span style="font-size:12px;color:var(--text3);font-family:'Outfit',sans-serif">No accounts yet</span>`:''}
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <input id="new-acct-inp" type="text" placeholder="e.g. Monzo, Lloyds, Savings" style="flex:1;font-size:13px;padding:8px 12px;border:0.5px solid var(--border2);border-radius:9px;background:var(--surface2);color:var(--text);font-family:'Outfit',sans-serif;outline:none"/>
        <button id="add-acct-btn" style="padding:8px 14px;border-radius:9px;background:var(--gold-bg);color:var(--gold);border:0.5px solid rgba(200,168,0,0.3);font-size:13px;font-family:'Outfit',sans-serif;cursor:pointer">Add</button>
      </div>
      <button id="ma-done" style="width:100%;padding:12px;border-radius:10px;background:var(--gold-bg);color:var(--gold);font-size:14px;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;border:0.5px solid rgba(200,168,0,0.3)">Done</button>
    </div>`;
  }

  overlay.innerHTML=buildSheet();
  document.body.appendChild(overlay);

  function rebind(){
    document.getElementById('ma-close').addEventListener('click',()=>{saveAccounts(accounts);overlay.remove();if(onClose)onClose();});
    document.getElementById('ma-done').addEventListener('click',()=>{saveAccounts(accounts);overlay.remove();if(onClose)onClose();});
    document.getElementById('add-acct-btn').addEventListener('click',()=>{
      const inp=document.getElementById('new-acct-inp');
      const val=inp.value.trim();
      if(val&&!accounts.includes(val)){accounts.push(val);inp.value='';overlay.innerHTML=buildSheet();rebind();}
    });
    document.getElementById('new-acct-inp').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('add-acct-btn').click();});
    overlay.querySelectorAll('[data-remove]').forEach(btn=>{
      btn.addEventListener('click',()=>{accounts.splice(parseInt(btn.dataset.remove),1);overlay.innerHTML=buildSheet();rebind();});
    });
  }
  rebind();
}

document.getElementById('buckets').addEventListener('click',e=>{
  const ba=e.target.closest('[data-bills-action]');
  if(ba){
    const action=ba.dataset.billsAction;
    if(action==='set-default'){saveBillsDefault();showToast('Default bills saved ✓');renderBuckets();return;}
    if(action==='clear'){showClearConfirm();return;}
    if(action==='import'){importBillsDefault();return;}
  }
  const hdr=e.target.closest('.card-header[data-bid]');if(hdr&&!e.target.closest('.split-tag')&&!e.target.closest('.edit-btn')){state.open[hdr.dataset.bid]=!state.open[hdr.dataset.bid];save();renderBuckets();return;}
  const st=e.target.closest('[data-split]');if(st){const iid=parseInt(st.dataset.split);state.splitOpen[iid]=!state.splitOpen[iid];save();renderBuckets();return;}
  const cs=e.target.closest('[data-confirm-split]');if(cs){const iid=parseInt(cs.dataset.confirmSplit);state.splitOpen[iid]=false;save();renderBuckets();renderOverview();return;}
  const mb=e.target.closest('.mode-pill');if(mb){const item=getItem(mb.dataset.bid,parseInt(mb.dataset.iid));item.mode=mb.dataset.mode;if(item.mode==='full')item.myAmt=item.total;if(item.mode==='half')item.myAmt=item.total/2;save();renderBuckets();renderOverview();return;}
  const del=e.target.closest('[data-del]');if(del){const b=state.buckets.find(x=>x.id===del.dataset.bid);b.items=b.items.filter(i=>i.id!==parseInt(del.dataset.del));save();render();return;}
  const add=e.target.closest('[data-add]');if(add){const b=state.buckets.find(x=>x.id===add.dataset.add);b.items.push({id:state.nextId++,name:'New item',total:0,mode:'full',myAmt:0});save();render();setTimeout(()=>{const rows=document.querySelectorAll(`.item-row[data-bid="${add.dataset.add}"]`);const last=rows[rows.length-1];if(last)showEditModal(add.dataset.add,parseInt(last.dataset.iid));},30);return;}
  const eb=e.target.closest('[data-edit-item]');if(eb){showEditModal(eb.dataset.bid,parseInt(eb.dataset.editItem));return;}
});

function renderOverview(){
  const inc=totalIncome(),out=totalOut(),left=inc-out,vis=state.incomeVisible,pct=inc>0?Math.min(100,(out/inc)*100):0;
  const segs=state.buckets.map(b=>{const p=inc>0?Math.min(100,(bucketTotal(b)/inc)*100):0;return`<div class="bar-seg" style="width:${p}%;background:${b.color}"></div>`;}).join('');
  document.getElementById('overview').innerHTML=`<div class="overview"><div class="ov-title">Overview</div><div class="ov-grid"><div class="ov-card"><div class="ov-label">Income</div><div class="ov-val${vis?'':' blurred'}">${fmt(inc)}</div></div><div class="ov-card"><div class="ov-label">Allocated</div><div class="ov-val${vis?'':' blurred'}">${fmt(out)}</div></div>${state.buckets.map(b=>`<div class="ov-card"><div class="ov-label">${b.name}</div><div class="ov-val" style="color:${b.color}">${fmt(bucketTotal(b))}</div></div>`).join('')}</div><div class="bar-track">${segs}</div><div class="bar-labels"><span>${vis?Math.round(pct)+'% allocated':'—'}</span><span class="${left<0?'neg':''}${vis?'':' blurred'}">${left>=0?fmt(left)+' left':'−'+fmt(Math.abs(left))+' over'}</span></div><div class="legend">${state.buckets.map(b=>`<div class="legend-item"><div class="legend-dot" style="background:${b.color}"></div>${b.name}</div>`).join('')}</div></div>`;
}

// ── HISTORY SCREEN ──
function getAllMonthKeys(){
  const keys=[];
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('dapple-')) keys.push(k.replace('dapple-',''));
    }
  }catch(e){}
  // also ensure current month is included
  const ck=monthKey(currentDate);
  if(!keys.includes(ck)) keys.push(ck);
  return keys.sort((a,b)=>b.localeCompare(a));
}

function getMonthState(key){
  try{const r=localStorage.getItem('dapple-'+key);if(r)return JSON.parse(r);}catch(e){}
  return null;
}

function monthKeyToLabel(key){
  // key is either "YYYY-MM-DD" (new) or "YYYY-MM" (old)
  const parts=key.split('-');
  if(parts.length===3){
    const [y,m,d]=parts.map(Number);
    const start=new Date(y,m-1,d);
    const end=periodEnd(start);
    const fmt2=(dt)=>dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    const yr=start.getFullYear()!==end.getFullYear()?` ${end.getFullYear()}`:'';
    return `${fmt2(start)} – ${fmt2(end)}${yr}`;
  }
  const [y,m]=parts.map(Number);
  return new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
}

document.getElementById('go-history').addEventListener('click',()=>{
  save();
  document.getElementById('main-screen').style.display='none';
  document.getElementById('history-screen').style.display='';
  renderHistory();
});

document.getElementById('go-back').addEventListener('click',()=>{
  document.getElementById('history-screen').style.display='none';
  document.getElementById('main-screen').style.display='';
});

function renderHistory(){
  const keys=getAllMonthKeys();
  const C_map={bills:'#b83030',saving:'#27a86a',investing:'#3d8fd4',free:'#c88a00'};

  // Aggregate totals across all months
  let grandIncome=0,grandOut=0;
  const bucketTotals={bills:0,saving:0,investing:0,free:0};

  const monthsHtml=keys.map(key=>{
    const s=getMonthState(key);
    if(!s) return '';
    const inc=Number(s.income)+(s.extraIncome||[]).reduce((x,i)=>x+Number(i.amt),0);
    const buckets=s.buckets||[];
    const out=buckets.reduce((x,b)=>x+b.items.reduce((y,i)=>y+Number(i.myAmt),0),0);
    grandIncome+=inc; grandOut+=out;
    buckets.forEach(b=>{
      const bt=b.items.reduce((y,i)=>y+Number(i.myAmt),0);
      if(bucketTotals[b.id]!==undefined) bucketTotals[b.id]+=bt;
    });
    const bucketsHtml=buckets.map(b=>{
      const bt=b.items.reduce((y,i)=>y+Number(i.myAmt),0);
      return `<div class="hist-bucket"><div class="hist-bucket-dot" style="background:${b.color||C_map[b.id]}"></div><span class="hist-bucket-name">${b.name}</span><span class="hist-bucket-val">${fmt(bt)}</span></div>`;
    }).join('');
    return `<div class="hist-month">
      <div class="hist-month-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
        <span class="hist-month-name">${monthKeyToLabel(key)}</span>
        <span class="hist-month-total">${fmt(out)}</span>
      </div>
      <div class="hist-body">${bucketsHtml}</div>
    </div>`;
  }).join('');

  const totalsHtml=`<div class="hist-totals">
    <div class="hist-totals-title">All-time totals</div>
    <div class="hist-totals-grid">
      <div class="hist-total-card"><div class="hist-total-label">Total income</div><div class="hist-total-val">${fmt(grandIncome)}</div></div>
      <div class="hist-total-card"><div class="hist-total-label">Total allocated</div><div class="hist-total-val">${fmt(grandOut)}</div></div>
      ${Object.entries(bucketTotals).map(([id,val])=>{
        const name=id.charAt(0).toUpperCase()+id.slice(1);
        return `<div class="hist-total-card"><div class="hist-total-label">${name}</div><div class="hist-total-val" style="color:${C_map[id]}">${fmt(val)}</div></div>`;
      }).join('')}
    </div>
  </div>`;

  document.getElementById('history-content').innerHTML=totalsHtml+monthsHtml;
}

render();
</script>
