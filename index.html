<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#141414"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Dapple"/>
<title>Dapple</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #141414;
  --bg2:      #181818;
  --surface:  #1e1e1e;
  --surface2: #242424;
  --surface3: #2a2a2a;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --gold:     #c8a800;
  --gold-dim: #7a6400;
  --gold-bg:  rgba(200,168,0,0.08);
  --text:     #a8a8a8;
  --text2:    #686868;
  --text3:    #444444;
  --red:      #b83030;
  --green:    #27a86a;
  --blue:     #3d8fd4;
  --amber:    #c88a00;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;overflow-x:hidden}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}

.header{
  position:sticky;top:0;z-index:100;background:var(--bg);
  padding:16px 20px 13px;border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-family:'Outfit',sans-serif;font-size:23px;font-weight:600;color:var(--text2);letter-spacing:-0.3px}
.logo span{color:var(--gold)}
.month-nav{display:flex;align-items:center;gap:8px}
.month-nav button{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1}
.month-nav button:active{background:var(--surface2)}
.month-label{font-size:12px;font-weight:400;color:var(--text2);min-width:90px;text-align:center}
.eye-toggle{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.eye-toggle:active{background:var(--surface2)}
.eye-toggle svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

.scroll{overflow-y:auto;height:calc(100vh - 58px);padding:13px 13px 40px}

.card{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;margin-bottom:8px;overflow:hidden}
.card-header{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;user-select:none}
.card-header:active{background:var(--surface2)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.card-title{font-size:13px;font-weight:500;flex:1;color:var(--text);letter-spacing:0.01em}
.card-total{font-size:13px;font-weight:400;color:var(--text2)}
.card-total.blurred{filter:blur(6px)}
.chevron{font-size:9px;color:var(--text3);transition:transform 0.2s;margin-left:2px}
.chevron.open{transform:rotate(90deg)}
.card-body{display:none;border-top:0.5px solid var(--border)}
.card-body.open{display:block}

.privacy-row{display:flex;align-items:center;gap:10px;padding:9px 15px;border-bottom:0.5px solid var(--border)}
.privacy-row span{font-size:11px;color:var(--text2);flex:1}
.pill-btn{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Outfit',sans-serif}
.pill-btn:active{opacity:0.7}

.item-row{border-bottom:0.5px solid var(--border)}
.item-row:last-of-type{border-bottom:none}
.item-main{display:flex;align-items:center;gap:8px;padding:10px 15px}
.item-name{font-size:13px;color:var(--text);flex:1;cursor:pointer;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400}
.item-name-input{font-size:13px;color:var(--text);flex:1;border:none;background:transparent;outline:none;min-width:0;font-family:'Outfit',sans-serif}
.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.item-amt{font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;font-weight:300}
.item-amt.blurred{filter:blur(5px);pointer-events:none}
.item-amt-input{font-size:13px;color:var(--text2);width:80px;text-align:right;border:none;background:transparent;outline:none;font-family:'Outfit',sans-serif;font-weight:300}
.split-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--gold-bg);color:var(--gold);border:0.5px solid rgba(200,168,0,0.18);cursor:pointer;white-space:nowrap}
.del-btn{font-size:12px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 4px;line-height:1}
.del-btn:active{color:var(--red)}

.split-panel{background:var(--surface2);padding:11px 15px 13px;display:none}
.split-panel.open{display:block}
.split-panel-title{font-size:11px;color:var(--text2);margin-bottom:9px}
.split-field{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.split-lbl{font-size:12px;color:var(--text2);width:70px;flex-shrink:0;font-weight:300}
.split-input{font-size:13px;padding:5px 9px;border:0.5px solid var(--border2);border-radius:7px;background:var(--surface3);color:var(--text);width:95px;font-family:'Outfit',sans-serif;font-weight:300}
.split-hint{font-size:11px;color:var(--text3)}
.mode-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.mode-pill{font-size:11px;padding:4px 9px;border-radius:20px;border:0.5px solid var(--border2);background:var(--surface3);color:var(--text2);cursor:pointer;font-family:'Outfit',sans-serif}
.mode-pill.active{background:var(--gold-bg);color:var(--gold);border-color:rgba(200,168,0,0.25)}
.mode-pill:active{opacity:0.7}

.add-row{padding:9px 15px}
.add-btn{font-size:12px;color:var(--text2);background:none;border:0.5px dashed var(--border2);border-radius:7px;padding:6px 12px;cursor:pointer;font-family:'Outfit',sans-serif;width:100%;text-align:left}
.add-btn:active{background:var(--surface2)}
.extra-note{font-size:11px;color:var(--text3);padding:3px 15px 9px;font-weight:300}

.overview{background:var(--surface);border:0.5px solid var(--border);border-radius:13px;padding:15px;margin-top:4px}
.ov-title{font-size:10px;font-weight:500;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.1em}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:13px}
.ov-card{background:var(--surface2);border-radius:9px;padding:9px 11px;border:0.5px solid var(--border)}
.ov-label{font-size:9px;font-weight:500;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.08em}
.ov-val{font-size:17px;font-weight:300;color:var(--text)}
.ov-val.blurred{filter:blur(6px)}
.ov-val.neg{color:var(--red)}
.bar-track{height:4px;border-radius:2px;background:var(--surface3);overflow:hidden;display:flex;margin-bottom:6px}
.bar-seg{height:100%;transition:width 0.35s ease}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:11px;font-weight:300}
.bar-labels .neg{color:var(--red)}
.bar-labels span.blurred{filter:blur(5px)}
.legend{display:flex;flex-wrap:wrap;gap:9px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:300}
.legend-dot{width:6px;height:6px;border-radius:50%}
#income-section .card{border-color:rgba(200,168,0,0.12)}
.salary-row .item-name{cursor:default}
</style>
</head>
<body>
<div class="header">
  <div class="logo">dap<span>p</span>le</div>
  <div style="display:flex;align-items:center;gap:6px">
    <button class="eye-toggle" id="header-eye" title="Toggle values">
      <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    </button>
    <div class="month-nav">
      <button id="prev-month">&#8249;</button>
      <span class="month-label" id="month-label"></span>
      <button id="next-month">&#8250;</button>
    </div>
  </div>
</div>
<div class="scroll">
  <div id="income-section"></div>
  <div id="buckets"></div>
  <div id="overview"></div>
</div>

<script>
const C={bills:'#b83030',saving:'#27a86a',investing:'#3d8fd4',free:'#c88a00'};

function defaultState(){return{incomeVisible:false,income:2800,extraIncome:[],buckets:[{id:'bills',name:'Bills',color:C.bills,items:[{id:1,name:'Rent',total:1000,mode:'fixed',myAmt:550},{id:2,name:'Energy',total:85,mode:'full',myAmt:85},{id:3,name:'Water',total:30,mode:'full',myAmt:30},{id:4,name:'Council tax',total:120,mode:'full',myAmt:120}]},{id:'saving',name:'Saving',color:C.saving,items:[{id:5,name:'Emergency fund',total:150,mode:'full',myAmt:150}]},{id:'investing',name:'Investing',color:C.investing,items:[{id:6,name:'Stocks / ETFs',total:100,mode:'full',myAmt:100}]},{id:'free',name:'Free spend',color:C.free,items:[{id:7,name:'Food & going out',total:200,mode:'full',myAmt:200}]}],open:{income:false,bills:true,saving:false,investing:false,free:false},splitOpen:{},nextId:20};}

let currentDate=new Date();
const monthKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const monthLbl=d=>d.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
const saveState=()=>{try{localStorage.setItem('dapple-'+monthKey(currentDate),JSON.stringify(state));}catch(e){}};
const loadState=()=>{try{const r=localStorage.getItem('dapple-'+monthKey(currentDate));if(r)return JSON.parse(r);}catch(e){}return defaultState();};

let state=loadState();
const fmt=n=>'£'+Math.round(n).toLocaleString('en-GB');
const myAmt=i=>Number(i.myAmt);
const bucketTotal=b=>b.items.reduce((s,i)=>s+myAmt(i),0);
const totalOut=()=>state.buckets.reduce((s,b)=>s+bucketTotal(b),0);
const extraTotal=()=>state.extraIncome.reduce((s,i)=>s+Number(i.amt),0);
const totalIncome=()=>Number(state.income)+extraTotal();
const splitLabel=item=>{if(item.mode==='full')return null;if(item.mode==='half')return'50%';if(item.mode==='pct'){const p=item.total>0?Math.round((item.myAmt/item.total)*100):0;return p+'%';}return'split';};
const save=()=>saveState();
const render=()=>{updateEyeIcon();renderIncome();renderBuckets();renderOverview();};

document.getElementById('month-label').textContent=monthLbl(currentDate);

function updateEyeIcon(){
  const vis=state.incomeVisible;
  document.getElementById('header-eye').style.color=vis?'var(--gold)':'var(--text3)';
  document.getElementById('eye-icon').innerHTML=vis
    ?'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
    :'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
}

document.getElementById('header-eye').addEventListener('click',()=>{
  state.incomeVisible=!state.incomeVisible;save();updateEyeIcon();render();
});
document.getElementById('prev-month').addEventListener('click',()=>{save();currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()-1,1);state=loadState();document.getElementById('month-label').textContent=monthLbl(currentDate);render();});
document.getElementById('next-month').addEventListener('click',()=>{save();currentDate=new Date(currentDate.getFullYear(),currentDate.getMonth()+1,1);state=loadState();document.getElementById('month-label').textContent=monthLbl(currentDate);render();});

function renderIncome(){
  const open=state.open.income,vis=state.incomeVisible,tot=totalIncome(),extra=extraTotal();
  document.getElementById('income-section').innerHTML=`<div class="card"><div class="card-header" id="income-hdr"><div class="dot" style="background:var(--gold)"></div><span class="card-title">Income</span><span class="card-total${vis?'':' blurred'}">${fmt(tot)}</span><span class="chevron${open?' open':''}">&#9654;</span></div><div class="card-body${open?' open':''}"><div class="privacy-row"><span>Values are ${vis?'visible':'hidden'} — toggle with the eye icon above</span></div><div class="item-row salary-row"><div class="item-main"><span class="item-name">Regular salary</span><div class="item-right"><span class="item-amt${vis?'':' blurred'}" id="salary-disp">${fmt(state.income)}</span><input class="item-amt-input" id="salary-inp" type="number" style="display:none" value="${state.income}"/></div></div></div>${state.extraIncome.map(item=>`<div class="item-row" data-xid="${item.id}"><div class="item-main"><span class="item-name extra-name" data-xid="${item.id}">${item.name}</span><div class="item-right"><span class="item-amt extra-amt${vis?'':' blurred'}" data-xid="${item.id}">${fmt(item.amt)}</span><button class="del-btn" data-xdel="${item.id}">✕</button></div></div></div>`).join('')}<div class="add-row"><button class="add-btn" id="add-extra">+ Add extra income</button></div>${extra>0?`<div class="extra-note">+${fmt(extra)} extra this month</div>`:''}</div></div>`;
  document.getElementById('income-hdr').addEventListener('click',e=>{if(e.target.closest('#salary-inp')||e.target.closest('.add-btn'))return;state.open.income=!state.open.income;save();renderIncome();});
  const sd=document.getElementById('salary-disp'),si=document.getElementById('salary-inp');
  if(vis&&sd){sd.style.cursor='pointer';sd.addEventListener('click',()=>{sd.style.display='none';si.style.display='';si.focus();si.select();});}
  si.addEventListener('blur',()=>{const v=parseFloat(si.value);if(!isNaN(v)&&v>=0)state.income=v;si.style.display='none';if(sd)sd.style.display='';save();render();});
  si.addEventListener('keydown',e=>{if(e.key==='Enter')si.blur();});
  document.querySelectorAll('.extra-name').forEach(el=>{el.addEventListener('click',()=>{const xid=parseInt(el.dataset.xid),item=state.extraIncome.find(i=>i.id===xid);const inp=document.createElement('input');inp.className='item-name-input';inp.value=item.name;el.replaceWith(inp);inp.focus();inp.select();const c=()=>{item.name=inp.value||item.name;save();renderIncome();};inp.addEventListener('blur',c);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});});});
  document.querySelectorAll('.extra-amt').forEach(el=>{if(!vis)return;el.style.cursor='pointer';el.addEventListener('click',()=>{const xid=parseInt(el.dataset.xid),item=state.extraIncome.find(i=>i.id===xid);const inp=document.createElement('input');inp.className='item-amt-input';inp.type='number';inp.value=item.amt;el.replaceWith(inp);inp.focus();inp.select();const c=()=>{const v=parseFloat(inp.value);if(!isNaN(v)&&v>=0)item.amt=v;save();render();};inp.addEventListener('blur',c);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});});});
  document.querySelectorAll('[data-xdel]').forEach(btn=>{btn.addEventListener('click',()=>{state.extraIncome=state.extraIncome.filter(i=>i.id!==parseInt(btn.dataset.xdel));save();renderIncome();renderOverview();});});
  document.getElementById('add-extra').addEventListener('click',()=>{state.extraIncome.push({id:state.nextId++,name:'Extra income',amt:0});save();renderIncome();setTimeout(()=>{const ns=document.querySelectorAll('.extra-name');if(ns.length)ns[ns.length-1].click();},50);});
}

function renderBuckets(){
  const el=document.getElementById('buckets');el.innerHTML='';
  state.buckets.forEach(b=>{
    const tot=bucketTotal(b),open=state.open[b.id],div=document.createElement('div');div.className='card';
    const items=b.items.map(item=>{
      const lbl=splitLabel(item),sOpen=state.splitOpen[item.id],ma=myAmt(item);
      const badge=`<span class="split-tag" data-split="${item.id}" data-bid="${b.id}">${lbl||'split'}</span>`;
      const sp=`<div class="split-panel${sOpen?' open':''}" id="sp-${item.id}"><div class="split-panel-title">Total bill and your share</div><div class="split-field"><span class="split-lbl">Total bill</span><input class="split-input" type="number" data-field="total" data-iid="${item.id}" data-bid="${b.id}" value="${item.total}"/></div><div class="mode-pills"><button class="mode-pill${item.mode==='full'?' active':''}" data-mode="full" data-iid="${item.id}" data-bid="${b.id}">I pay all</button><button class="mode-pill${item.mode==='half'?' active':''}" data-mode="half" data-iid="${item.id}" data-bid="${b.id}">50 / 50</button><button class="mode-pill${item.mode==='fixed'?' active':''}" data-mode="fixed" data-iid="${item.id}" data-bid="${b.id}">Fixed amount</button><button class="mode-pill${item.mode==='pct'?' active':''}" data-mode="pct" data-iid="${item.id}" data-bid="${b.id}">Percentage</button></div>${item.mode==='fixed'?`<div class="split-field"><span class="split-lbl">I pay</span><input class="split-input" type="number" data-field="myAmt" data-iid="${item.id}" data-bid="${b.id}" value="${item.myAmt}"/><span class="split-hint">of ${fmt(item.total)}</span></div>`:''}${item.mode==='pct'?`<div class="split-field"><span class="split-lbl">My share</span><input class="split-input" type="number" data-field="pct" data-iid="${item.id}" data-bid="${b.id}" value="${item.total>0?Math.round((item.myAmt/item.total)*100):50}" min="0" max="100"/><span class="split-hint">%</span></div>`:''}</div>`;
      return `<div class="item-row" data-bid="${b.id}" data-iid="${item.id}"><div class="item-main"><span class="item-name" data-edit="name">${item.name}</span><div class="item-right">${lbl?badge:''}<span class="item-amt" data-edit="amt">${fmt(ma)}${item.mode!=='full'?`<span style="font-size:10px;color:var(--text3)"> of ${fmt(item.total)}</span>`:''}</span>${!lbl?badge:''}<button class="del-btn" data-del="${item.id}" data-bid="${b.id}">✕</button></div></div>${sp}</div>`;
    }).join('');
    div.innerHTML=`<div class="card-header" data-bid="${b.id}"><div class="dot" style="background:${b.color}"></div><span class="card-title">${b.name}</span><span class="card-total">${fmt(tot)}</span><span class="chevron${open?' open':''}">&#9654;</span></div><div class="card-body${open?' open':''}">${items}<div class="add-row"><button class="add-btn" data-add="${b.id}">+ Add item</button></div></div>`;
    el.appendChild(div);
  });
  document.querySelectorAll('.split-input').forEach(inp=>{inp.addEventListener('input',()=>{const bid=inp.dataset.bid,iid=parseInt(inp.dataset.iid),b=state.buckets.find(x=>x.id===bid),item=b.items.find(i=>i.id===iid),v=parseFloat(inp.value)||0;if(inp.dataset.field==='total'){item.total=v;if(item.mode==='half')item.myAmt=v/2;if(item.mode==='pct'){const p=item.total>0?item.myAmt/item.total:0.5;item.myAmt=v*p;}if(item.mode==='full')item.myAmt=v;}else if(inp.dataset.field==='myAmt')item.myAmt=Math.min(v,item.total);else if(inp.dataset.field==='pct')item.myAmt=(v/100)*item.total;save();const row=document.querySelector(`.item-row[data-bid="${bid}"][data-iid="${iid}"]`);if(row){const as=row.querySelector('.item-amt');if(as)as.innerHTML=`${fmt(myAmt(item))}${item.mode!=='full'?`<span style="font-size:10px;color:var(--text3)"> of ${fmt(item.total)}</span>`:''}`;const bh=document.querySelector(`.card-header[data-bid="${bid}"] .card-total`);if(bh)bh.textContent=fmt(bucketTotal(b));}renderOverview();});});
}

const getItem=(bid,iid)=>state.buckets.find(b=>b.id===bid)?.items.find(i=>i.id===iid);

function startEdit(row,bid,iid,field){
  const item=getItem(bid,iid);if(!item)return;
  if(field==='name'){const span=row.querySelector('.item-name[data-edit]'),inp=document.createElement('input');inp.className='item-name-input';inp.value=item.name;span.replaceWith(inp);inp.focus();inp.select();const c=()=>{item.name=inp.value||item.name;save();render();};inp.addEventListener('blur',c);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});}
  else{const span=row.querySelector('.item-amt[data-edit]'),inp=document.createElement('input');inp.className='item-amt-input';inp.type='number';inp.value=item.myAmt;span.replaceWith(inp);inp.focus();inp.select();const c=()=>{const v=parseFloat(inp.value);if(!isNaN(v)&&v>=0){item.myAmt=v;item.total=Math.max(item.total,v);item.mode='fixed';}save();render();};inp.addEventListener('blur',c);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});}
}

document.getElementById('buckets').addEventListener('click',e=>{
  const hdr=e.target.closest('.card-header[data-bid]');if(hdr&&!e.target.closest('.split-tag')){state.open[hdr.dataset.bid]=!state.open[hdr.dataset.bid];save();renderBuckets();return;}
  const st=e.target.closest('[data-split]');if(st){const iid=parseInt(st.dataset.split);state.splitOpen[iid]=!state.splitOpen[iid];save();renderBuckets();return;}
  const mb=e.target.closest('.mode-pill');if(mb){const item=getItem(mb.dataset.bid,parseInt(mb.dataset.iid));item.mode=mb.dataset.mode;if(item.mode==='full')item.myAmt=item.total;if(item.mode==='half')item.myAmt=item.total/2;save();renderBuckets();renderOverview();return;}
  const del=e.target.closest('[data-del]');if(del){const b=state.buckets.find(x=>x.id===del.dataset.bid);b.items=b.items.filter(i=>i.id!==parseInt(del.dataset.del));save();render();return;}
  const add=e.target.closest('[data-add]');if(add){const b=state.buckets.find(x=>x.id===add.dataset.add);b.items.push({id:state.nextId++,name:'New item',total:0,mode:'full',myAmt:0});save();render();setTimeout(()=>{const rows=document.querySelectorAll(`.item-row[data-bid="${add.dataset.add}"]`);const last=rows[rows.length-1];if(last)startEdit(last,add.dataset.add,parseInt(last.dataset.iid),'name');},30);return;}
  const ns=e.target.closest('.item-name[data-edit]');if(ns){const row=ns.closest('.item-row');startEdit(row,row.dataset.bid,parseInt(row.dataset.iid),'name');return;}
  const as=e.target.closest('.item-amt[data-edit]');if(as){const row=as.closest('.item-row');startEdit(row,row.dataset.bid,parseInt(row.dataset.iid),'amt');return;}
});

function renderOverview(){
  const inc=totalIncome(),out=totalOut(),left=inc-out,vis=state.incomeVisible,pct=inc>0?Math.min(100,(out/inc)*100):0;
  const segs=state.buckets.map(b=>{const p=inc>0?Math.min(100,(bucketTotal(b)/inc)*100):0;return`<div class="bar-seg" style="width:${p}%;background:${b.color}"></div>`;}).join('');
  document.getElementById('overview').innerHTML=`<div class="overview"><div class="ov-title">Overview</div><div class="ov-grid"><div class="ov-card"><div class="ov-label">Income</div><div class="ov-val${vis?'':' blurred'}">${fmt(inc)}</div></div><div class="ov-card"><div class="ov-label">Allocated</div><div class="ov-val${vis?'':' blurred'}">${fmt(out)}</div></div>${state.buckets.map(b=>`<div class="ov-card"><div class="ov-label">${b.name}</div><div class="ov-val" style="color:${b.color}">${fmt(bucketTotal(b))}</div></div>`).join('')}</div><div class="bar-track">${segs}</div><div class="bar-labels"><span>${vis?Math.round(pct)+'% allocated':'—'}</span><span class="${left<0?'neg':''}${vis?'':' blurred'}">${left>=0?fmt(left)+' left':'−'+fmt(Math.abs(left))+' over'}</span></div><div class="legend">${state.buckets.map(b=>`<div class="legend-item"><div class="legend-dot" style="background:${b.color}"></div>${b.name}</div>`).join('')}</div></div>`;
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
render();
</script>
</body>
